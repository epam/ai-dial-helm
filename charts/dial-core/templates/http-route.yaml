{{- if .Values.httpRoute.enabled -}}

{{- if or (not .Values.httpRoute.parentRefs) (lt (len .Values.httpRoute.parentRefs) 1) }}
{{- fail (printf "httpRoute.gatewayParentRefs must be defined and contain at least one gateway reference.") }}
{{- end -}}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "dialCore.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: core
  {{- if or .Values.httpRoute.annotations .Values.commonAnnotations }}
  {{- $annotations := merge .Values.httpRoute.annotations .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  parentRefs: {{- include "common.tplvalues.render" (dict "value" .Values.httpRoute.parentRefs "context" $) | nindent 4 }}
  {{- if .Values.httpRoute.hostnames }}
  hostnames: {{- include "common.tplvalues.render" (dict "value" .Values.httpRoute.hostnames "context" $) | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.rules }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.httpRoute.rules "context" $ ) | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ template "dialCore.names.fullname" . }}
          port: {{ .Values.service.ports.http}}
    {{- end }}
{{- end }}
