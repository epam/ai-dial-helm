annotations:
  category: MachineLearning
  licenses: Apache-2.0
apiVersion: v2
appVersion: "1.41.1"
dependencies:
  - name: common
    repository: oci://registry-1.docker.io/bitnamicharts
    tags:
      - bitnami-common
    version: 2.31.4
  - name: keycloak
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
    version: 24.9.0
  - name: dial-core
    repository: https://charts.dialx.ai
    alias: core
    condition: core.enabled
    version: 5.1.1
  - name: dial-extension
    repository: https://charts.dialx.ai
    alias: chat
    condition: chat.enabled
    version: 3.0.1
  - name: dial-extension
    repository: https://charts.dialx.ai
    alias: themes
    condition: themes.enabled
    version: 3.0.1
  - name: dial-extension
    repository: https://charts.dialx.ai
    alias: openai
    condition: openai.enabled
    version: 3.0.1
  - name: dial-extension
    repository: https://charts.dialx.ai
    alias: bedrock
    condition: bedrock.enabled
    version: 3.0.1
  - name: dial-extension
    repository: https://charts.dialx.ai
    alias: vertexai
    condition: vertexai.enabled
    version: 3.0.1
  - name: dial-extension
    repository: https://charts.dialx.ai
    alias: dial
    condition: dial.enabled
    version: 3.0.1
description: Umbrella chart for DIAL solution
home: https://dialx.ai/
icon: "https://docs.dialx.ai/img/favicon.ico"
keywords:
  - ai-dial
kubeVersion: ">=1.23.0-0"
maintainers:
  - name: EPAM Systems
    url: https://github.com/epam
name: dial
sources:
  - https://github.com/epam/ai-dial-helm/tree/main/charts/dial
version: 6.0.0
