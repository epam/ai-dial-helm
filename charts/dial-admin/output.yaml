              value: dial_admin
            - name: POSTGRES_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-release-postgresql
                  key: password
            - name: CONFIG_EXPORT_STORAGETYPE
              value: "LOCAL_FILE"
            - name: CONFIG_EXPORT_OUTPUTFILE_PATH
              value: "/data/core-config.json"
