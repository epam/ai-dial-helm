{{- if and (.Values.deploymentManager.enabled) (eq .Values.deploymentManager.configuration.datasource.datasourceVendor "postgresql") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.tplvalues.render" (dict "value" .Values.postgresql.primary.initdb.scriptsSecret "context" .Subcharts.postgresql) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.deploymentManager.commonLabels "context" $.Subcharts.deploymentManager ) | nindent 4 }}
  {{- if .Values.deploymentManager.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.deploymentManager.commonAnnotations "context" $.Subcharts.deploymentManager ) | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  create-multiple-dbs.sh: |
    #!/bin/bash
    set -e

    DEPLOYMENT_MANAGER_DATABASE="{{ include "dialAdmin.deploymentManager.database.name" . }}"
    DEPLOYMENT_MANAGER_USER="{{ include "dialAdmin.deploymentManager.database.user" . }}"
    DEPLOYMENT_MANAGER_PASSWORD="{{ include "dialAdmin.deploymentManager.database.password" . }}"

    echo "Creating multiple databases..."

    # Check if any of the required environment variables are empty
    if [ -z "$DEPLOYMENT_MANAGER_DATABASE" ] || [ -z "$DEPLOYMENT_MANAGER_USER" ] || [ -z "$DEPLOYMENT_MANAGER_PASSWORD" ]; then
      echo "Skipping database creation due to missing environment variables."
    else
      echo "Creating database: "$DEPLOYMENT_MANAGER_DATABASE" with user: "$DEPLOYMENT_MANAGER_USER" "
      PGPASSWORD="${POSTGRES_POSTGRES_PASSWORD}" psql -v ON_ERROR_STOP=1 --username "postgres" <<-EOSQL
        CREATE USER $DEPLOYMENT_MANAGER_USER WITH ENCRYPTED PASSWORD '$DEPLOYMENT_MANAGER_PASSWORD';
        CREATE DATABASE $DEPLOYMENT_MANAGER_DATABASE WITH OWNER $DEPLOYMENT_MANAGER_USER;
    EOSQL
    fi
    echo "Multiple databases created."
{{- end }}
