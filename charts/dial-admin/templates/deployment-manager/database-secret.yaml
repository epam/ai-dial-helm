{{- if .Values.deploymentManager.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.tplvalues.render" (dict "value" .Values.deploymentManager.extraEnvVarsSecret "context" .Subcharts.deploymentManager) }}
  namespace: {{ include "common.names.namespace" .Subcharts.deploymentManager | quote }}
  {{- end }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.deploymentManager.commonLabels "context" $.Subcharts.deploymentManager ) | nindent 4 }}
  {{- if .Values.deploymentManager.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.deploymentManager.commonAnnotations "context" $.Subcharts.deploymentManager ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if .Values.postgresql.enabled }}
  DATASOURCE_VENDOR: {{ "POSTGRES" | b64enc | quote }}
  POSTGRES_HOST: {{ include "dialAdmin.database.host" . | b64enc | quote }}
  POSTGRES_PORT: {{ include "common.tplvalues.render" (dict "value" .Values.postgresql.containerPorts.postgresql "context" .Subcharts.postgresql) | b64enc | quote }}
  POSTGRES_DATABASE: {{ include "dialAdmin.deploymentManager.database.name" . | b64enc | quote }}
  POSTGRES_DATASOURCE_USERNAME: {{ include "dialAdmin.deploymentManager.database.user" . | b64enc | quote }}
  POSTGRES_DATASOURCE_PASSWORD: {{ include "dialAdmin.deploymentManager.database.password" . | b64enc | quote }}
  {{- else }}
  DB_CONFIG: {{ "Used extrnal database" | b64enc | quote }}
  {{- end }}
{{- end }}

---

{{- if and (.Values.deploymentManager.enabled) (eq .Values.deploymentManager.configuration.datasource.datasourceVendor "postgresql") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.tplvalues.render" (dict "value" .Values.postgresql.primary.initdb.scriptsSecret "context" .Subcharts.postgresql) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: analytics
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  DEPLOYMENT_MANAGER_DATABASE: {{ include "dialAdmin.deploymentManager.database.name" . | b64enc | quote }}
  DEPLOYMENT_MANAGER_USER: {{ include "dialAdmin.deploymentManager.database.user" . | b64enc | quote }}
  DEPLOYMENT_MANAGER_PASSWORD: {{ include "dialAdmin.deploymentManager.database.password" . | b64enc | quote }}
{{- end }}